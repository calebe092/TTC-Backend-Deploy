spring.application.name=projetoEletro

server.port=${PORT:8081}

# Configuração do banco PostgreSQL - Supabase
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://db.qwwpyrakxdrzimjnaczf.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
